apiVersion: apps/v1

kind: Deployment

metadata:
  name: python-flask-app-deployment

spec:
  replicas: 1

  selector:
    matchLabels:
      app: python-flask-app

  template:
    metadata:
      labels:
        app: python-flask-app

    spec:
      containers:
      - name: python-flask-container
        image: pythonflaskcrudapp:v1
        imagePullPolicy: Never
        ports:
        - containerPort: 5000
